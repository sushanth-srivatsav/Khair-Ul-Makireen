<!DOCTYPE html>
<html>
<head>
<title>Habits</title>

<style>
body {
  margin:0;
  background:#000;
  color:#e5e5e5;
  font-family:Arial;
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  background:#111;
  padding:15px;
}
.nav a {
  color:#888;
  margin:0 15px;
  text-decoration:none;
}
.nav a.active {
  color:white;
  border-bottom:2px solid white;
}

/* CONTAINER */
.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* INPUT */
input, button {
  padding:8px;
  margin:5px;
  border:none;
  border-radius:5px;
}
button {
  background:white;
  color:black;
  cursor:pointer;
}

/* TABLE */
.table {
  margin-top:20px;
}

.header, .row {
  display:flex;
  align-items:center;
}

.header div {
  font-size:12px;
  color:#aaa;
}

.header div, .row div {
  min-width:28px;
  text-align:center;
}

.habit-name {
  width:160px;
  text-align:left;
  padding-left:5px;
}

/* CARD */
.card {
  background:#111827;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

/* STREAK */
.streak {
  width:60px;
}

/* DELETE */
.del-btn {
  width:50px;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="goals.html">Goals</a>
<a href="time.html">Time</a>
<a href="habits.html" class="active">Habits</a>
<a href="analysis.html">Analysis</a>
</div>

<div class="container">

<h2>Habit Tracker</h2>

<input id="habitInput" placeholder="Enter habit">
<button onclick="addHabit()">Add Habit</button>

<div id="table" class="table"></div>

</div>

<script>

// GET DAYS IN MONTH
function getDays(){
  let now = new Date();
  return new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
}

let totalDays = getDays();

// LOAD DATA
let habits = JSON.parse(localStorage.getItem("habits")) || [];

function save(){
  localStorage.setItem("habits", JSON.stringify(habits));
}

// ADD HABIT
function addHabit(){

  let name = document.getElementById("habitInput").value;

  if(!name) return;

  habits.push({
    name,
    days: new Array(totalDays).fill(false)
  });

  // 🔗 LINK TO ANALYSIS
  let idx = localStorage.getItem("analysisHabitIndex");
  if(idx !== null){
    let analysis = JSON.parse(localStorage.getItem("analysis")) || [];
    analysis[idx].habitIndex = habits.length - 1;

    localStorage.setItem("analysis", JSON.stringify(analysis));
    localStorage.removeItem("analysisHabitIndex");
  }

  save();
  render();
}

// TOGGLE DAY
function toggle(hIndex, dIndex){
  habits[hIndex].days[dIndex] = !habits[hIndex].days[dIndex];
  save();
}

// STREAK CALCULATION (continuous from end)
function calculateStreak(days){
  let count = 0;
  for(let i = days.length - 1; i >= 0; i--){
    if(days[i]) count++;
    else break;
  }
  return count;
}

// DELETE HABIT
function deleteHabit(i){
  if(confirm("Delete this habit?")){
    habits.splice(i,1);
    save();
    render();
  }
}

// RENDER UI
function render(){

  let html = "";

  // HEADER ROW
  html += `<div class="header">`;
  html += `<div class="habit-name">Habit</div>`;

  for(let d=1; d<=totalDays; d++){
    html += `<div>${d}</div>`;
  }

  html += `<div class="streak">Streak</div>`;
  html += `<div class="del-btn">Del</div>`;
  html += `</div>`;

  // HABITS
  habits.forEach((h,i)=>{

    html += `<div class="card"><div class="row">`;

    html += `<div class="habit-name">${h.name}</div>`;

    for(let d=0; d<totalDays; d++){
      html += `
      <div>
        <input type="checkbox"
        ${h.days[d] ? "checked" : ""}
        onchange="toggle(${i}, ${d})">
      </div>`;
    }

    html += `<div class="streak">${calculateStreak(h.days)}</div>`;

    html += `<div class="del-btn">
      <button onclick="deleteHabit(${i})">X</button>
    </div>`;

    html += `</div></div>`;
  });

  document.getElementById("table").innerHTML = html;
}

render();

</script>

</body>
</html>
