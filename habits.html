<!DOCTYPE html>
<html>
<head>
<title>Habits</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="goals.html">Goals</a>
<a href="time.html">Time</a>
<a href="habits.html" class="active">Habits</a>
<a href="analysis.html">Analysis</a>
</div>

<div class="container">

<h2>Habit Tracker</h2>

<input id="habitInput" placeholder="Enter habit">
<button onclick="addHabit()">Add Habit</button>

<div class="table-wrapper">
    <div id="table" class="table"></div>
</div>

</div>

<script>

// GET DAYS IN MONTH
function getDays(){
  let now = new Date();
  return new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
}

let totalDays = getDays();

// LOAD DATA
let habits = JSON.parse(localStorage.getItem("habits")) || [];

function save(){
  localStorage.setItem("habits", JSON.stringify(habits));
}

// ADD HABIT
function addHabit(){

  let name = document.getElementById("habitInput").value;

  if(!name) return;

  habits.push({
    name,
    days: {}
  });

  // 🔗 LINK TO ANALYSIS
  let idx = localStorage.getItem("analysisHabitIndex");
  if(idx !== null){
    let analysis = JSON.parse(localStorage.getItem("analysis")) || [];
    analysis[idx].habitIndex = habits.length - 1;

    localStorage.setItem("analysis", JSON.stringify(analysis));
    localStorage.removeItem("analysisHabitIndex");
  }

  save();
  render();
}

// TOGGLE DAY
function toggle(hIndex,dIndex){

    let now = new Date();

    let key =
        now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(dIndex+1).padStart(2,"0");

    habits[hIndex].days[key] = !habits[hIndex].days[key];

    save();

    render();
}
// STREAK CALCULATION (continuous from end)
function calculateStreak(days){

    let streak=0;

    let date=new Date();

    if(!days[
        date.getFullYear()+"-"+
        String(date.getMonth()+1).padStart(2,"0")+"-"+
        String(date.getDate()).padStart(2,"0")
    ]){
        date.setDate(date.getDate()-1);
    }

    while(true){

        let key=
            date.getFullYear()+"-"+
            String(date.getMonth()+1).padStart(2,"0")+"-"+
            String(date.getDate()).padStart(2,"0");

        if(days[key]){
            streak++;
            date.setDate(date.getDate()-1);
        }else{
            break;
        }

    }

    return streak;
}
// DELETE HABIT
function deleteHabit(i){
  if(confirm("Delete this habit?")){
    habits.splice(i,1);
    save();
    render();
  }
}

// RENDER UI
function render(){

  let html = "";

  // HEADER ROW
  html += `<div class="header">`;
  html += `<div class="habit-name">Habit</div>`;

  for(let d=1; d<=totalDays; d++){
    html += `<div>${d}</div>`;
  }

  html += `<div class="streak">Streak</div>`;
  html += `<div class="del-btn">Del</div>`;
  html += `</div>`;

  // HABITS
  habits.forEach((h,i)=>{

    html += `<div class="card"><div class="row">`;

    html += `<div class="habit-name">${h.name}</div>`;

    let today = new Date().getDate() - 1;

for(let d=0; d<totalDays; d++){

  let disabled = d !== today ? "disabled" : "";

  html += `
  <div>
    <input type="checkbox"
    ${h.days[
new Date().getFullYear()+"-"+
String(new Date().getMonth()+1).padStart(2,"0")+"-"+
String(d+1).padStart(2,"0")
] ? "checked" : ""}
    ${disabled}
    onchange="toggle(${i}, ${d})">
  </div>`;
}

    html += `<div class="streak">${calculateStreak(h.days)}</div>`;

    html += `<div class="del-btn">
      <button onclick="deleteHabit(${i})">X</button>
    </div>`;

    html += `</div></div>`;
  });

  document.getElementById("table").innerHTML = html;
}

render();

</script>

</body>
</html>
