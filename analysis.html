<!DOCTYPE html>
<html>
<head>
<title>Analysis</title>

<style>
body {
  margin:0;
  background:#000;
  color:#e5e5e5;
  font-family:Arial;
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  background:#111;
  padding:15px;
}
.nav a {
  color:#888;
  margin:0 15px;
  text-decoration:none;
}
.nav a.active {
  color:white;
  border-bottom:2px solid white;
}

/* CONTAINER */
.container {
  max-width:750px;
  margin:auto;
  padding:20px;
}

/* INPUT BOX */
.input-box {
  background:#111827;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.input-box input {
  width:90%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:5px;
  background:#000;
  color:white;
  border:1px solid #333;
}

/* BUTTON */
button {
  padding:8px 15px;
  margin-top:10px;
  border:none;
  border-radius:5px;
  background:white;
  color:black;
  cursor:pointer;
}

/* CARD */
.card {
  background:#111827;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="goals.html">Goals</a>
<a href="time.html">Time</a>
<a href="habits.html">Habits</a>
<a href="analysis.html" class="active">Analysis</a>
</div>

<div class="container">

<h2>Problem Analysis</h2>

<div class="input-box">
<input id="problem" placeholder="Define your problem clearly">
<input id="solution" placeholder="What is your approach to solve it?">
<input id="time" placeholder="Time required (in days)">
<button onclick="createAnalysis()">Create</button>
</div>

<div id="analysisList"></div>

</div>

<script>

// LOAD
let analysis = JSON.parse(localStorage.getItem("analysis")) || [];

function save(){
  localStorage.setItem("analysis", JSON.stringify(analysis));
}

// CREATE
function createAnalysis(){
  let p = document.getElementById("problem").value;
  let s = document.getElementById("solution").value;
  let t = document.getElementById("time").value;

  if(!p || !s || !t){
    alert("Fill all fields");
    return;
  }

  analysis.push({
    problem:p,
    solution:s,
    time:t,
    goalIndex:null
  });

  save();
  render();
}

// LINK TO GOALS
function addGoal(i){
  localStorage.setItem("analysisIndex", i);
  window.location.href = "goals.html";
}

// MOTIVATION
function message(p){
  let msgs = [
    "Khair-Ul-Makireen sees your beginning.",
    "You are moving forward.",
    "Consistency is forming.",
    "Stay controlled.",
    "Execution is sharpening.",
    "Do not slow down.",
    "You are close.",
    "Finish it with discipline."
  ];
  return msgs[Math.floor(p/12)] || "";
}

// RENDER
function render(){

  let goals = JSON.parse(localStorage.getItem("goals")) || [];
  let html = "";

  analysis.forEach((a,i)=>{

    let progressText = "No goal linked";

    if(a.goalIndex !== null && goals[a.goalIndex]){
      let g = goals[a.goalIndex];
      let pct = ((g.num/g.den)*100).toFixed(1);

      progressText = `
        Progress: ${pct}%<br>
        ${message(pct)}
      `;
    }

    html += `
    <div class="card">
      <h3>${a.problem}</h3>
      <p><b>Solution:</b> ${a.solution}</p>
      <p><b>Time Required:</b> ${a.time} days</p>
      <p>${progressText}</p>

      <button onclick="addGoal(${i})">Add Goal</button>
    </div>
    `;
  });

  document.getElementById("analysisList").innerHTML = html;
}

render();

</script>

</body>
</html>
