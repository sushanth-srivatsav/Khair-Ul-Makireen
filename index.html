<!DOCTYPE html>
<html>
<head>
<title>Execution System</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

  /* =========================
   HOME LAYOUT
========================= */

.home-layout{
  display:flex;
  flex-direction:row;

  justify-content:space-between;
  align-items:center;

  gap:60px;

  max-width:1400px;

  margin:auto;
}

/* =========================
   WARRIOR SYSTEM
========================= */

.warrior-container{
  flex:1;

  display:flex;
  justify-content:center;
  align-items:center;

  min-height:700px;
}

/* MAIN */

.warrior{
  position:relative;

  width:320px;
  height:620px;

  animation:float 5s ease-in-out infinite;

  filter:
    drop-shadow(0 0 25px rgba(255,255,255,0.08));
}

/* CAPE */

.cape{
  position:absolute;

  width:220px;
  height:420px;

  background:rgba(255,255,255,0.02);

  border-left:2px solid rgba(255,255,255,0.1);
  border-right:2px solid rgba(255,255,255,0.1);

  left:50px;
  top:120px;

  clip-path:polygon(
    20% 0%,
    80% 0%,
    100% 100%,
    0% 100%
  );

  animation:capeMove 6s ease-in-out infinite;
}

/* HEAD */

.head{
  position:absolute;

  width:90px;
  height:90px;

  border:2px solid rgba(255,255,255,0.9);

  border-radius:50%;

  top:30px;
  left:115px;

  background:black;

  box-shadow:
    0 0 20px rgba(255,255,255,0.08);
}

/* EYES */

.eyes{
  position:absolute;

  width:26px;
  height:5px;

  background:white;

  top:40px;
  left:30px;

  box-shadow:
    0 0 15px rgba(255,255,255,0.9);

  animation:blink 7s infinite;
}

/* TORSO */

.torso{
  position:absolute;

  width:120px;
  height:220px;

  top:130px;
  left:100px;

  background:black;

  border:
    2px solid rgba(255,255,255,0.9);

  clip-path:polygon(
    20% 0%,
    80% 0%,
    100% 100%,
    0% 100%
  );

  box-shadow:
    0 0 20px rgba(255,255,255,0.05);
}

/* SHOULDERS */

.shoulder{
  position:absolute;

  width:70px;
  height:28px;

  border:
    2px solid rgba(255,255,255,0.9);

  background:black;

  top:135px;
}

.left-shoulder{
  left:45px;
  transform:rotate(-20deg);
}

.right-shoulder{
  right:45px;
  transform:rotate(20deg);
}

/* ARMS */

.arm{
  position:absolute;

  width:28px;
  height:190px;

  background:black;

  border:
    2px solid rgba(255,255,255,0.9);

  border-radius:20px;

  top:165px;
}

.left-arm{
  left:60px;
  transform:rotate(8deg);
}

.right-arm{
  right:60px;
  transform:rotate(-8deg);
}

/* LEGS */

.leg{
  position:absolute;

  width:34px;
  height:230px;

  background:black;

  border:
    2px solid rgba(255,255,255,0.9);

  border-radius:20px;

  top:340px;
}

.left-leg{
  left:115px;
}

.right-leg{
  right:115px;
}

/* SWORD */

.sword{
  position:absolute;

  width:10px;
  height:320px;

  background:white;

  right:20px;
  top:180px;

  box-shadow:
    0 0 25px rgba(255,255,255,0.6);
}

/* FLOAT */

@keyframes float{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-12px);
  }

  100%{
    transform:translateY(0px);
  }
}

/* CAPE */

@keyframes capeMove{

  0%{
    transform:skewX(0deg);
  }

  50%{
    transform:skewX(2deg);
  }

  100%{
    transform:skewX(0deg);
  }
}

/* BLINK */

@keyframes blink{

  0%, 48%, 52%, 100%{
    opacity:1;
  }

  50%{
    opacity:0;
  }
}
  /* PAGE SPECIFIC */

.hero{
  min-height:85vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  text-align:center;

  padding:40px;
}

.title{
  font-size:48px;

  font-family:'Playfair Display', serif;

  margin-bottom:20px;

  letter-spacing:2px;
}

.welcome{
  font-size:28px;

  margin-bottom:30px;

  font-weight:600;
}

.description{
  max-width:900px;

  line-height:1.9;

  font-size:19px;

  color:#d1d1d1;

  margin-bottom:50px;
}

.signature-box{
  margin-top:20px;
}

.signature{
  margin-top:20px;

  font-size:34px;

  font-family:'Great Vibes', cursive;

  color:white;
}

.glow-text{
  text-shadow:
    0 0 10px rgba(255,255,255,0.15);
}

</style>
</head>

<body>

<!-- NAV -->

<div class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="goals.html">Goals</a>
  <a href="time.html">Time</a>
  <a href="habits.html">Habits</a>
  <a href="analysis.html">Analysis</a>
</div>

<!-- HERO -->

<div class="hero fade-in home-layout">

  <div class="title glow-text">
    KHAIR-UL-MAKIREEN
  </div>

  <div id="welcomeMsg" class="welcome glow-text"></div>

  <div id="messageBox" class="description"></div>

  <!-- WARRIOR -->

<div class="warrior-container">

  <div class="warrior">

    <div class="head"></div>

    <div class="body"></div>

    <div class="arm left-arm"></div>
    <div class="arm right-arm"></div>

    <div class="leg left-leg"></div>
    <div class="leg right-leg"></div>

    <div class="sword"></div>

    <div class="eyes"></div>

  </div>

</div>

  <!-- SIGN -->

  <div class="signature-box" id="signBox">

    <p><b>I am committed.</b></p>

    <input id="username" placeholder="Enter your name">

    <button onclick="saveName()">Sign</button>

  </div>

  <!-- SIGNATURE -->

  <div id="signature" class="signature"></div>

</div>

<script>

// SAVE USER
function saveName(){

  const name = document.getElementById("username").value.trim();

  if(!name) return;

  localStorage.setItem("username", name);

  loadUser();
}

// LOAD USER
function loadUser(){

  const name = localStorage.getItem("username");

  const welcome = document.getElementById("welcomeMsg");
  const message = document.getElementById("messageBox");
  const signBox = document.getElementById("signBox");
  const signature = document.getElementById("signature");

  if(name){

    // AFTER SIGNING

    welcome.innerText = "Welcome back " + name;

    message.innerHTML = `
    You have chosen control. From this point forward, your actions are measured.
    Every goal you set will demand execution, not intention.
    Time will continue moving regardless — your response defines your outcome.
    This system reflects your discipline without bias.
    If you act, progress will emerge. If you delay, decline will reveal itself.
    There is no comfort here — only clarity.
    Stay disciplined. Stay precise. Stay in control.
    `;

    signature.innerText = name;

    signBox.style.display = "none";

  } else {

    // BEFORE SIGNING

    welcome.innerText = "KHAIR-UL-MAKIREEN welcomes you";

    message.innerHTML = `
    You are entering a system built for discipline and execution.
    Every action taken here is reflected back through progress, habits, and time.
    This is not passive planning — this is structured accountability.
    Your consistency will shape your outcome.
    Your decisions will shape your identity.
    What you choose to do next determines everything.
    `;
  }
}

// INIT
loadUser();

</script>

</body>
</html>
