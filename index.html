<!DOCTYPE html>
<html>
<head>
<title>Execution System</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

  /* =========================
   HOME LAYOUT
========================= */

.home-layout{
  display:flex;
  flex-direction:row;

  justify-content:space-between;
  align-items:center;

  gap:60px;

  max-width:1400px;

  margin:auto;
}

/* =========================
   WARRIOR
========================= */

.warrior-container{
  flex:1;

  display:flex;
  justify-content:center;
  align-items:center;

  min-height:600px;
}

.warrior{
  position:relative;

  width:220px;
  height:500px;

  animation:float 4s ease-in-out infinite;

  filter:
    drop-shadow(0 0 12px rgba(255,255,255,0.15));
}

/* HEAD */

.head{
  position:absolute;

  width:70px;
  height:70px;

  border:2px solid white;
  border-radius:50%;

  top:20px;
  left:75px;

  background:black;
}

/* EYES */

.eyes{
  position:absolute;

  width:22px;
  height:4px;

  background:white;

  top:55px;
  left:99px;

  box-shadow:
    0 0 10px white;

  animation:blink 6s infinite;
}

/* BODY */

.body{
  position:absolute;

  width:90px;
  height:170px;

  border:2px solid white;

  top:100px;
  left:65px;

  border-radius:20px;

  background:black;
}

/* ARMS */

.arm{
  position:absolute;

  width:18px;
  height:140px;

  border:2px solid white;

  border-radius:20px;

  background:black;
}

.left-arm{
  top:120px;
  left:30px;

  transform:rotate(10deg);
}

.right-arm{
  top:120px;
  right:30px;

  transform:rotate(-10deg);
}

/* LEGS */

.leg{
  position:absolute;

  width:22px;
  height:160px;

  border:2px solid white;

  border-radius:20px;

  background:black;
}

.left-leg{
  top:260px;
  left:75px;
}

.right-leg{
  top:260px;
  right:75px;
}

/* SWORD */

.sword{
  position:absolute;

  width:8px;
  height:220px;

  background:white;

  right:-10px;
  top:170px;

  box-shadow:
    0 0 12px rgba(255,255,255,0.4);
}

/* FLOAT */

@keyframes float{
  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-10px);
  }

  100%{
    transform:translateY(0px);
  }
}

/* BLINK */

@keyframes blink{
  0%, 47%, 53%, 100%{
    opacity:1;
  }

  50%{
    opacity:0;
  }
}

/* PAGE SPECIFIC */

.hero{
  min-height:85vh;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  text-align:center;

  padding:40px;
}

.title{
  font-size:48px;

  font-family:'Playfair Display', serif;

  margin-bottom:20px;

  letter-spacing:2px;
}

.welcome{
  font-size:28px;

  margin-bottom:30px;

  font-weight:600;
}

.description{
  max-width:900px;

  line-height:1.9;

  font-size:19px;

  color:#d1d1d1;

  margin-bottom:50px;
}

.signature-box{
  margin-top:20px;
}

.signature{
  margin-top:20px;

  font-size:34px;

  font-family:'Great Vibes', cursive;

  color:white;
}

.glow-text{
  text-shadow:
    0 0 10px rgba(255,255,255,0.15);
}

</style>
</head>

<body>

<!-- NAV -->

<div class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="goals.html">Goals</a>
  <a href="time.html">Time</a>
  <a href="habits.html">Habits</a>
  <a href="analysis.html">Analysis</a>
</div>

<!-- HERO -->

<div class="hero fade-in">

  <div class="title glow-text">
    KHAIR-UL-MAKIREEN
  </div>

  <div id="welcomeMsg" class="welcome glow-text"></div>

  <div id="messageBox" class="description"></div>

  <!-- SIGN -->

  <div class="signature-box" id="signBox">

    <p><b>I am committed.</b></p>

    <input id="username" placeholder="Enter your name">

    <button onclick="saveName()">Sign</button>

  </div>

  <!-- SIGNATURE -->

  <div id="signature" class="signature"></div>

</div>

<script>

// SAVE USER
function saveName(){

  const name = document.getElementById("username").value.trim();

  if(!name) return;

  localStorage.setItem("username", name);

  loadUser();
}

// LOAD USER
function loadUser(){

  const name = localStorage.getItem("username");

  const welcome = document.getElementById("welcomeMsg");
  const message = document.getElementById("messageBox");
  const signBox = document.getElementById("signBox");
  const signature = document.getElementById("signature");

  if(name){

    // AFTER SIGNING

    welcome.innerText = "Welcome back " + name;

    message.innerHTML = `
    You have chosen control. From this point forward, your actions are measured.
    Every goal you set will demand execution, not intention.
    Time will continue moving regardless — your response defines your outcome.
    This system reflects your discipline without bias.
    If you act, progress will emerge. If you delay, decline will reveal itself.
    There is no comfort here — only clarity.
    Stay disciplined. Stay precise. Stay in control.
    `;

    signature.innerText = name;

    signBox.style.display = "none";

  } else {

    // BEFORE SIGNING

    welcome.innerText = "KHAIR-UL-MAKIREEN welcomes you";

    message.innerHTML = `
    You are entering a system built for discipline and execution.
    Every action taken here is reflected back through progress, habits, and time.
    This is not passive planning — this is structured accountability.
    Your consistency will shape your outcome.
    Your decisions will shape your identity.
    What you choose to do next determines everything.
    `;
  }
}

// INIT
loadUser();

</script>

</body>
</html>
