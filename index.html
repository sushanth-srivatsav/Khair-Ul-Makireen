<!DOCTYPE html>
<html>
<head>
<title>Execution System</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- NAVIGATION -->

<div class="nav">
    <a href="index.html" class="active">Home</a>
    <a href="goals.html">Goals</a>
    <a href="time.html">Time</a>
    <a href="habits.html">Habits</a>
    <a href="analysis.html">Analysis</a>
</div>

<!-- HERO SECTION -->

<div class="hero fade-in">

    <div class="title glow-text">
        KHAIR-UL-MAKIREEN
    </div>

    <div id="welcomeMsg" class="welcome glow-text"></div>

    <div id="messageBox" class="description"></div>

    <!-- SIGNATURE BOX -->

    <div class="signature-box" id="signBox">

        <p><b>I am committed.</b></p>

        <input
            id="username"
            type="text"
            placeholder="Enter your name">

        <button onclick="saveName()">
            Sign
        </button>

    </div>

    <!-- SIGNATURE DISPLAY -->

    <div id="signature" class="signature"></div>

</div>

<script>

// SAVE USER

function saveName(){

    const name =
        document.getElementById("username")
        .value
        .trim();

    if(!name) return;

    localStorage.setItem(
        "username",
        name
    );

    loadUser();
}

// LOAD USER

function loadUser(){

    const name =
        localStorage.getItem("username");

    const welcome =
        document.getElementById("welcomeMsg");

    const message =
        document.getElementById("messageBox");

    const signBox =
        document.getElementById("signBox");

    const signature =
        document.getElementById("signature");

    if(name){

        // AFTER SIGNING

     

       message.innerHTML = `
The darkness gathers, and now my war begins.<br>
It shall not end until I win.<br>
I shall seek no detours and fear no adversity.<br>
My body strong as stone.<br>
My mind sharp as steel.<br>
I shan't kneel before lust, nor be ruled by my demons.<br>
I shall command my time, thoughts, and actions.<br>
I shall abstain from worldly pleasures.<br>
I shall neither cuss nor curse.<br>
Though I feel uninterested, every day I shall train, learn, and advance.<br>
I am sworn to rebuild myself no matter how hard it might seem.<br>
I shall rise higher than my emotions and circumstances.<br>
Though I stand alone in the dark, I shall not retreat.<br>
Though the entire world is against me, I shall not bend my knee.<br>
I am the Commander of Harmageddon.<br>
I am the Guardian of Bethel.<br>
This is my watch, and I am bound to it,<br>
for this night and all the nights to come.<br>
Until victory is won,<br>
<b>My watch shall not end.</b>
`;

        signature.innerText = name;

        signBox.style.display = "none";

    }

    else{

        // BEFORE SIGNING

        welcome.innerText =
            "KHAIR-UL-MAKIREEN welcomes you";

        message.innerHTML = `
        You are entering a system built for discipline and execution.
        Every action taken here is reflected through goals, habits, and time.
        This is not a place for passive planning.
        It is a place for measured action.
        Every choice compounds.
        Every delay has a cost.
        Every completed objective strengthens your identity.
        Consistency creates momentum.
        Discipline creates freedom.
        What you choose to do next determines everything.
        `;
    }
}

// INITIALIZE

loadUser();

</script>

</body>
</html>
