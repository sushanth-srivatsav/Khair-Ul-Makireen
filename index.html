<!DOCTYPE html>
<html>
<head>
<title>Execution System</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#000;color:#e5e5e5;font-family:Arial;display:flex;flex-direction:column;align-items:center;}

.nav{width:100%;display:flex;justify-content:center;background:#111;padding:15px;}
.nav a{color:#888;margin:0 15px;text-decoration:none;}
.nav a.active{color:white;border-bottom:2px solid white;}

.title{font-size:34px;margin-top:40px;font-family:'Playfair Display',serif;}

.welcome{margin-top:20px;font-size:26px;font-weight:bold;color:#fff;}

.container{max-width:750px;text-align:center;margin-top:40px;line-height:1.9;font-family:'Playfair Display',serif;}

.signature-box{margin-top:50px;text-align:center;}

input,button{padding:8px;margin:8px;border:none;border-radius:5px;}
button{background:white;color:black;cursor:pointer;}

.signature{margin-top:15px;font-size:32px;font-family:'Great Vibes',cursive;border-top:1px solid #444;}
</style>
</head>

<body>

<div class="nav">
<a href="index.html" class="active">Home</a>
<a href="goals.html">Goals</a>
<a href="time.html">Time</a>
<a href="habits.html">Habits</a>
<a href="analysis.html">Analysis</a>
</div>

<div class="title">KHAIR-UL-MAKIREEN welcomes you</div>
<div id="welcomeMsg" class="welcome"></div>
<div class="container" id="messageBox"></div>

<div class="signature-box" id="signBox">
<p><b>I am committed.</b></p>
<input id="username" placeholder="Enter your name">
<button onclick="saveName()">Sign</button>
</div>

<div class="signature" id="signature"></div>

<script>
function saveName(){
let name=document.getElementById("username").value;
if(!name)return;
localStorage.setItem("username",name);
loadUser();
}

function loadUser(){
let name=localStorage.getItem("username");

if(name){
document.getElementById("welcomeMsg").innerText="Welcome back "+name;
document.getElementById("messageBox").innerHTML=
"You chose control. Now act. Every day counts.";
document.getElementById("signature").innerText=name;
document.getElementById("signBox").style.display="none";
}else{
document.getElementById("messageBox").innerHTML=
"You are here to build control, discipline, and execution.";
}
}

loadUser();
</script>

</body>
</html>
