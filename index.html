<!DOCTYPE html>
<html>
<head>
<title>Execution System</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* PAGE-SPECIFIC */

.hero{
    min-height:85vh;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    padding:40px;
}

.title{
    font-size:48px;

    font-family:'Playfair Display', serif;

    letter-spacing:2px;

    margin-bottom:20px;
}

.welcome{
    font-size:28px;

    font-weight:600;

    margin-bottom:30px;
}

.description{
    max-width:900px;

    line-height:1.9;

    font-size:19px;

    color:#d1d1d1;

    margin-bottom:50px;
}

.signature-box{
    margin-top:20px;
}

.signature{
    margin-top:20px;

    font-size:34px;

    font-family:'Great Vibes', cursive;

    color:white;
}

.glow-text{
    text-shadow:
        0 0 10px rgba(255,255,255,0.15);
}

</style>

</head>

<body>

<!-- NAVIGATION -->

<div class="nav">
    <a href="index.html" class="active">Home</a>
    <a href="goals.html">Goals</a>
    <a href="time.html">Time</a>
    <a href="habits.html">Habits</a>
    <a href="analysis.html">Analysis</a>
</div>

<!-- HERO SECTION -->

<div class="hero fade-in">

    <div class="title glow-text">
        KHAIR-UL-MAKIREEN
    </div>

    <div id="welcomeMsg" class="welcome glow-text"></div>

    <div id="messageBox" class="description"></div>

    <!-- SIGNATURE BOX -->

    <div class="signature-box" id="signBox">

        <p><b>I am committed.</b></p>

        <input
            id="username"
            type="text"
            placeholder="Enter your name">

        <button onclick="saveName()">
            Sign
        </button>

    </div>

    <!-- SIGNATURE DISPLAY -->

    <div id="signature" class="signature"></div>

</div>

<script>

// SAVE USER

function saveName(){

    const name =
        document.getElementById("username")
        .value
        .trim();

    if(!name) return;

    localStorage.setItem(
        "username",
        name
    );

    loadUser();
}

// LOAD USER

function loadUser(){

    const name =
        localStorage.getItem("username");

    const welcome =
        document.getElementById("welcomeMsg");

    const message =
        document.getElementById("messageBox");

    const signBox =
        document.getElementById("signBox");

    const signature =
        document.getElementById("signature");

    if(name){

        // AFTER SIGNING

        welcome.innerText =
            "Welcome back " + name;

        message.innerHTML = `
        You have chosen control. From this point forward, your actions are measured.
        Every goal you set will demand execution, not intention.
        Time will continue moving regardless — your response defines your outcome.
        This system reflects your discipline without bias.
        If you act, progress will emerge. If you delay, decline will reveal itself.
        There is no comfort here — only clarity.
        Stay disciplined. Stay precise. Stay in control.
        `;

        signature.innerText = name;

        signBox.style.display = "none";

    }

    else{

        // BEFORE SIGNING

        welcome.innerText =
            "KHAIR-UL-MAKIREEN welcomes you";

        message.innerHTML = `
        You are entering a system built for discipline and execution.
        Every action taken here is reflected through goals, habits, and time.
        This is not a place for passive planning.
        It is a place for measured action.
        Every choice compounds.
        Every delay has a cost.
        Every completed objective strengthens your identity.
        Consistency creates momentum.
        Discipline creates freedom.
        What you choose to do next determines everything.
        `;
    }
}

// INITIALIZE

loadUser();

</script>

</body>
</html>
