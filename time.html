<!DOCTYPE html>
<html>
<head>
<title>Time Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="goals.html">Goals</a>
<a href="time.html" class="active">Time</a>
<a href="habits.html">Habits</a>
<a href="analysis.html">Analysis</a>
</div>

<div class="container">

    <h2 style="text-align:center;">Time Tracker</h2>

    <div class="card" style="max-width:350px;margin:auto;text-align:center;">

        <canvas id="chart"></canvas>

        <p id="days"></p>
        <p id="percent"></p>

    </div>
<h2 style="text-align:center;margin-top:40px;">
Goal Timelines
</h2>

<div id="goalTimers" class="goalTimers"></div>

</div>

 <style>

#chart{
    width:220px !important;
    height:220px !important;

    margin:auto;

    display:block;
}

.goalTimers{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:20px;
    margin-top:30px;
}

.goalCard{
    background:#111827;
    border:1px solid #333;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.goalCard canvas{
    width:130px !important;
    height:130px !important;
    margin:auto;
    display:block;
}

.goalCard h3{
    margin-bottom:10px;
}

.goalCard p{
    margin:5px 0;
    font-size:14px;
}

</style>
  
<script>

// TIME RANGE
let start = new Date("2026-03-28");
let end = new Date("2027-02-27");
let today = new Date();

start.setHours(0,0,0,0);
end.setHours(0,0,0,0);
today.setHours(0,0,0,0);

// CALCULATIONS
let total = end - start;
let passed = today - start;

passed = Math.max(0, Math.min(passed, total));
let remaining = total - passed;

let days = Math.ceil(remaining / (1000*60*60*24));
let pct = ((passed / total) * 100).toFixed(2);

document.getElementById("days").innerText = "Days Remaining: " + days;
document.getElementById("percent").innerText = "Completed: " + pct + "%";

// LOAD GOALS
let goals = JSON.parse(localStorage.getItem("goals")) || [];

// POPUP FUNCTION
function showPopup(goal){
  let div = document.createElement("div");
  div.className = "popup";

  div.innerHTML = `
    <h3>${goal.name}</h3>
    <p>${goal.num}/${goal.den}</p>
    <p>Deadline: ${goal.date}</p>
    <button onclick="this.parentElement.remove()">Close</button>
  `;

  document.body.appendChild(div);
}

function renderGoalTimers(){

const container=document.getElementById("goalTimers");

container.innerHTML="";

goals.forEach((g,index)=>{

let goalStart=start;

let goalEnd=new Date(g.date);

goalEnd.setHours(0,0,0,0);

let totalDays=goalEnd-goalStart;

if(totalDays<=0)return;

let elapsed=today-goalStart;

elapsed=Math.max(0,Math.min(elapsed,totalDays));

let percent=((elapsed/totalDays)*100);

percent=Math.max(0,Math.min(100,percent));

let daysLeft=Math.ceil((goalEnd-today)/(1000*60*60*24));

if(daysLeft<0)daysLeft=0;

let card=document.createElement("div");

card.className="goalCard";

card.innerHTML=`

<h3>${g.name}</h3>

<canvas id="goalChart${index}"></canvas>

<p><b>Deadline:</b> ${g.date}</p>

<p><b>Days Left:</b> ${daysLeft}</p>

<p><b>Progress:</b> ${g.num}/${g.den}</p>

<p><b>Time Used:</b> ${percent.toFixed(1)}%</p>

`;

container.appendChild(card);

new Chart(

document.getElementById("goalChart"+index),

{

type:"doughnut",

data:{

datasets:[

{

// OUTER RING (TIME)

data:[
percent,
100-percent
],

backgroundColor:[
"#ffffff",
"#111827"
],

borderWidth:0,

radius:"100%",

cutout:"70%"

},

{

// INNER RING (GOAL)

data:[
(g.num/g.den)*100,
100-((g.num/g.den)*100)
],

backgroundColor:[
"#9ca3af",
"#222222"
],

borderWidth:0,

radius:"68%",

cutout:"45%"

}

]

},

options:{

responsive:true,

plugins:{

legend:{
display:false
}

}

}

});

});

}

// CUSTOM MARKER PLUGIN
const markerPlugin = {
  id: "markers",

  afterDraw(chart){
    const ctx = chart.ctx;
    const meta = chart.getDatasetMeta(0).data[0];

    const cx = meta.x;
    const cy = meta.y;
    const r = meta.outerRadius - 5;

    goals.forEach((g, i) => {

      let d = new Date(g.date);

      // Ignore invalid
      if(d < start || d > end) return;

      let progress = (d - start) / (end - start);

      let angle = (-0.5 * Math.PI) + (2 * Math.PI * progress);

      let x = cx + r * Math.cos(angle);
      let y = cy + r * Math.sin(angle);

      // DRAW MARK
      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fill();

      // CLICK DETECTION
      chart.canvas.onclick = function(evt){
        let rect = chart.canvas.getBoundingClientRect();
        let mx = evt.clientX - rect.left;
        let my = evt.clientY - rect.top;

        let dx = mx - x;
        let dy = my - y;

        if(Math.sqrt(dx*dx + dy*dy) < 6){
          showPopup(g);
        }
      }

    });
  }
};

// CREATE CHART
new Chart(document.getElementById("chart"), {
  type: "doughnut",
  data: {
    datasets: [{
      data: [pct, 100 - pct],
      backgroundColor: ["#ffffff", "#111827"],
      borderWidth: 0
    }]
  },
  options: {
    plugins: {
      legend: { display:false }
    }
  },
  plugins: [markerPlugin]
});

renderGoalTimers();

</script>

</body>
</html>
