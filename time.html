<!DOCTYPE html>
<html>
<head>
<title>Time Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  background:#111;
  padding:15px;
}
.nav a {
  color:#888;
  margin:0 15px;
  text-decoration:none;
}
.nav a.active {
  color:white;
  border-bottom:2px solid white;
}

/* CHART */
canvas {
  max-width:260px;
  margin:30px auto;
}

/* POPUP */
.popup {
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:10px;
  text-align:center;
  z-index:1000;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="goals.html">Goals</a>
<a href="time.html" class="active">Time</a>
<a href="habits.html">Habits</a>
<a href="analysis.html">Analysis</a>
</div>

<h2>Time Tracker</h2>

<canvas id="chart"></canvas>

<p id="days"></p>
<p id="percent"></p>

<script>

// TIME RANGE
let start = new Date("2026-03-28");
let end = new Date("2026-11-11");
let today = new Date();

// CALCULATIONS
let total = end - start;
let passed = today - start;

passed = Math.max(0, Math.min(passed, total));
let remaining = total - passed;

let days = Math.ceil(remaining / (1000*60*60*24));
let pct = ((passed / total) * 100).toFixed(2);

document.getElementById("days").innerText = "Days Remaining: " + days;
document.getElementById("percent").innerText = "Completed: " + pct + "%";

// LOAD GOALS
let goals = JSON.parse(localStorage.getItem("goals")) || [];

// POPUP FUNCTION
function showPopup(goal){
  let div = document.createElement("div");
  div.className = "popup";

  div.innerHTML = `
    <h3>${goal.name}</h3>
    <p>${goal.num}/${goal.den}</p>
    <p>Deadline: ${goal.date}</p>
    <button onclick="this.parentElement.remove()">Close</button>
  `;

  document.body.appendChild(div);
}

// CUSTOM MARKER PLUGIN
const markerPlugin = {
  id: "markers",

  afterDraw(chart){
    const ctx = chart.ctx;
    const meta = chart.getDatasetMeta(0).data[0];

    const cx = meta.x;
    const cy = meta.y;
    const r = meta.outerRadius - 5;

    goals.forEach((g, i) => {

      let d = new Date(g.date);

      // Ignore invalid
      if(d < start || d > end) return;

      let progress = (d - start) / (end - start);

      let angle = (-0.5 * Math.PI) + (2 * Math.PI * progress);

      let x = cx + r * Math.cos(angle);
      let y = cy + r * Math.sin(angle);

      // DRAW MARK
      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fill();

      // CLICK DETECTION
      chart.canvas.onclick = function(evt){
        let rect = chart.canvas.getBoundingClientRect();
        let mx = evt.clientX - rect.left;
        let my = evt.clientY - rect.top;

        let dx = mx - x;
        let dy = my - y;

        if(Math.sqrt(dx*dx + dy*dy) < 6){
          showPopup(g);
        }
      }

    });
  }
};

// CREATE CHART
new Chart(document.getElementById("chart"), {
  type: "doughnut",
  data: {
    datasets: [{
      data: [pct, 100 - pct],
      backgroundColor: ["#ffffff", "#111827"],
      borderWidth: 0
    }]
  },
  options: {
    plugins: {
      legend: { display:false }
    }
  },
  plugins: [markerPlugin]
});

</script>

</body>
</html>
