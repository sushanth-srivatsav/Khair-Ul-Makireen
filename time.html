<h2>Time Tracker</h2>
<canvas id="chart"></canvas>

<script>
let s=new Date("2026-03-28");
let e=new Date("2026-11-11");
let t=new Date();

let total=e-s;
let passed=t-s;
let pct=((passed/total)*100).toFixed(2);

new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{datasets:[{data:[pct,100-pct],backgroundColor:["white","#111"]}]}
});
</script>
