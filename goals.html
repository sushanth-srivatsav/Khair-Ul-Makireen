<!DOCTYPE html>
<html>
<head>
<title>Goals</title>
<style>
body{background:#000;color:white;font-family:Arial;margin:0;}
.nav{display:flex;justify-content:center;background:#111;padding:15px;}
.nav a{color:#888;margin:0 15px;text-decoration:none;}
.nav a.active{color:white;border-bottom:2px solid white;}

.container{max-width:700px;margin:auto;padding:20px;}

.card{background:#111827;padding:15px;margin:10px 0;border-radius:10px;}

.progress-bar{height:8px;background:#222;margin-top:5px;}
.progress-fill{height:100%;background:white;}
</style>
</head>
<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="goals.html" class="active">Goals</a>
<a href="time.html">Time</a>
<a href="habits.html">Habits</a>
<a href="analysis.html">Analysis</a>
</div>

<div class="container">

<input id="name" placeholder="Goal">
<input id="date" type="date">
<input id="den" placeholder="Total">
<button onclick="add()">Add</button>

<div id="goals"></div>
<h3>Completed</h3>
<div id="done"></div>

</div>

<script>
let goals=JSON.parse(localStorage.getItem("goals"))||[];

function save(){localStorage.setItem("goals",JSON.stringify(goals));}

function msg(p){
return "Khair-Ul-Makireen observes: "+p+"% completed.";
}

function render(){
let gHTML="",dHTML="";

goals.forEach((g,i)=>{
let pct=((g.num/g.den)*100).toFixed(1);

let card=`
<div class="card">
<h3>${g.name}</h3>
<p>${g.num}/${g.den} (${pct}%)</p>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
<p>${msg(pct)}</p>
<input id="n${i}" placeholder="update">
<button onclick="update(${i})">Update</button>
<button onclick="del(${i})">Delete</button>
</div>`;

if(g.done)dHTML+=card;
else gHTML+=card;
});

document.getElementById("goals").innerHTML=gHTML;
document.getElementById("done").innerHTML=dHTML;
}

function add(){
let name=document.getElementById("name").value;
let date=document.getElementById("date").value;
let den=Number(document.getElementById("den").value);

goals.push({name,date,num:0,den,done:false});
save(); render();
}

function update(i){
let n=Number(document.getElementById("n"+i).value);
goals[i].num=n;

if(n>=goals[i].den){
goals[i].done=true;
alert("Khair-Ul-Makireen: Goal completed.");
}
save(); render();
}

function del(i){
if(confirm("Confirm delete?") && confirm("Final confirm?")){
goals.splice(i,1); save(); render();
}
}

render();
</script>

</body>
</html>
